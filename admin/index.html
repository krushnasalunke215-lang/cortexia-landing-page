<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cortexia Ops — Internal Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo"><i class="fas fa-satellite-dish"></i></div>
    <h1>Cortexia Ops</h1>
    <p class="login-sub">Internal Operations Portal</p>
    <div id="login-error" class="login-error"></div>
    <form onsubmit="event.preventDefault();adminLogin()">
      <input type="text" id="login-email" placeholder="Email" autocomplete="username">
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
      <button type="submit" id="login-btn">Sign In</button>
    </form>
  </div>
</div>

<!-- MAIN SHELL -->
<div id="app" class="app" style="display:none">
  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-left">
      <i class="fas fa-satellite-dish topbar-icon"></i>
      <span class="topbar-title">Cortexia Ops</span>
    </div>
    <div class="topbar-right">
      <span id="admin-name" class="admin-name"></span>
      <button class="btn-icon" onclick="adminLogout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </header>

  <!-- Sidebar Nav -->
  <nav class="sidebar">
    <button class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>
    <button class="nav-item" data-tab="devices" onclick="switchTab('devices')"><i class="fas fa-mobile-alt"></i><span>Devices</span><span id="pending-badge" class="badge" style="display:none">0</span></button>
    <button class="nav-item" data-tab="businesses" onclick="switchTab('businesses')"><i class="fas fa-building"></i><span>Businesses</span></button>
    <button class="nav-item" data-tab="alerts" onclick="switchTab('alerts')"><i class="fas fa-bell"></i><span>Alerts</span></button>
  </nav>

  <!-- Content -->
  <main class="content">
    <!-- DASHBOARD -->
    <section id="tab-dashboard" class="tab-content active">
      <h2>Dashboard</h2>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-icon" style="background:rgba(79,70,229,.15);color:#7C3AED"><i class="fas fa-building"></i></div><div class="stat-body"><div class="stat-value" id="stat-businesses">—</div><div class="stat-label">Businesses</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(16,185,129,.15);color:#10B981"><i class="fas fa-mobile-alt"></i></div><div class="stat-body"><div class="stat-value" id="stat-devices">—</div><div class="stat-label">Active Devices</div></div></div>
        <div class="stat-card accent"><div class="stat-icon" style="background:rgba(245,158,11,.15);color:#F59E0B"><i class="fas fa-clock"></i></div><div class="stat-body"><div class="stat-value" id="stat-pending">—</div><div class="stat-label">Pending Approval</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(239,68,68,.15);color:#EF4444"><i class="fas fa-exclamation-triangle"></i></div><div class="stat-body"><div class="stat-value" id="stat-alerts">—</div><div class="stat-label">Active Alerts</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(59,130,246,.15);color:#3B82F6"><i class="fas fa-phone-missed"></i></div><div class="stat-body"><div class="stat-value" id="stat-missed-today">—</div><div class="stat-label">Missed Calls Today</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(139,92,246,.15);color:#8B5CF6"><i class="fas fa-user-plus"></i></div><div class="stat-body"><div class="stat-value" id="stat-leads-today">—</div><div class="stat-label">Leads Today</div></div></div>
      </div>

      <!-- Pending Approvals Quick List -->
      <div class="section-card" id="pending-section" style="display:none">
        <h3><i class="fas fa-clock" style="color:#F59E0B;margin-right:8px"></i>Pending Device Approvals</h3>
        <div id="pending-list" class="device-list"></div>
      </div>
    </section>

    <!-- DEVICES -->
    <section id="tab-devices" class="tab-content">
      <div class="tab-header">
        <h2>Devices</h2>
        <div class="filter-bar">
          <button class="filter-chip active" onclick="filterDevices('all')">All</button>
          <button class="filter-chip" onclick="filterDevices('PENDING_APPROVAL')">Pending</button>
          <button class="filter-chip" onclick="filterDevices('APPROVED')">Active</button>
          <button class="filter-chip" onclick="filterDevices('REJECTED')">Rejected</button>
        </div>
      </div>
      <div id="devices-list" class="device-list"></div>
    </section>

    <!-- BUSINESSES -->
    <section id="tab-businesses" class="tab-content">
      <h2>Businesses</h2>
      <div id="businesses-list" class="device-list"></div>
    </section>

    <!-- ALERTS -->
    <section id="tab-alerts" class="tab-content">
      <h2>Alerts</h2>
      <div id="alerts-list" class="device-list"><div class="empty-state"><i class="fas fa-check-circle"></i><p>No active alerts</p></div></div>
    </section>
  </main>
</div>

<script src="admin.js"></script>
</body>
</html>
